apiVersion: v1
kind: ServiceAccount
metadata:
  name: langgraph-ai-agent
  namespace: default
  annotations:
    description: "Least-privilege service account for the Auto-Remediation LangGraph API"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: langgraph-ai-operator-role
  namespace: default
rules:
  # 1. Permission to read metadata and logs (Used by log_parser_node)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # 2. Permission to perform remediation actions (Used by execute_remediation_node)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
    
  # 3. Permission to scale or rollout deployments (Used by execute_remediation_node)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]

  # EXPLICIT OMISSION: No access to Secrets, ConfigMaps, or Namespace deletion.

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: langgraph-ai-operator-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: langgraph-ai-agent
    namespace: default
roleRef:
  kind: Role
  name: langgraph-ai-operator-role
  apiGroup: rbac.authorization.k8s.io
